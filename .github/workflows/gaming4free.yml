name: gaming4free 续期
on:
  workflow_dispatch:
  # schedule:
  #   - cron: '*/30 * * * *'
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
      - name: 检出私有脚本仓库
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: private-repo
      - name: 设置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 安装系统和识别依赖
        timeout-minutes: 12
        run: |
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends -o Acquire::Retries=3 xvfb wget unzip curl jq p7zip-full \
            ffmpeg python3 python3-pip
          python3 -m pip install --quiet SpeechRecognition pydub
      - name: 安装 Playwright 浏览器
        timeout-minutes: 10
        run: |
          cd private-repo/scripts/gm4
          npm install
          npx playwright install chromium
      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client
      - name: 修复 DNS
        run: |
          echo "[INFO] 停用 systemd-resolved，设置公共 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup gaming4free.org 1.1.1.1 || echo "[WARN] 解析失败"

          echo ""
          echo "[INFO] WARP Trace:"
          trace=$(curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace || true)
          echo "$trace" | grep -E 'ip=|warp=|loc=' || true
      - name: 检查当前出口 IP
        run: |
          curl -s --max-time 10 https://api.ipify.org || true
          echo
          curl -s --max-time 10 https://ipinfo.io || true
      - name: 执行自动续期脚本
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p private-repo/scripts/gm4/screenshots
          xvfb-run -a node private-repo/scripts/gm4/renew.js
      - name: 清理旧的工作流运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 4
