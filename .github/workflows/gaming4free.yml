name: gaming4free renew (WARP)
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # =========================
      # 🟡 0️⃣ 当前仓库
      # =========================
      - uses: actions/checkout@v4

      # =========================
      # 🟡 ⭐ 私有仓库
      # =========================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: private-repo

      # =========================
      # 🟡 Node环境
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # 🟡 1️⃣ WARP
      # =========================
      - name: 创建WARP网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      # =========================
      # 🟡 2️⃣ 系统依赖（音频）
      # =========================
      - name: Install deps
        timeout-minutes: 8
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full \
            ffmpeg python3 python3-pip

          python3 -m pip install --quiet SpeechRecognition pydub

      # =========================
      # 🟡 3️⃣ 安装 Playwright（修复点）
      # =========================
      - name: Install playwright
        timeout-minutes: 10
        run: |
          cd private-repo/scripts/gm4
          npm install
          npx playwright install chromium

      # =========================
      # 🟡 4️⃣ 调试 IP
      # =========================
      - name: Check IP
        run: |
          echo "🌍 当前 IP:"
          curl -s https://api.ipify.org
          echo
          curl -s https://ipinfo.io

      # =========================
      # 🟡 5️⃣ 运行脚本
      # =========================
      - name: Run script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p private-repo/scripts/gm4/screenshots
          xvfb-run -a node private-repo/scripts/gm4/renew.js
