name: Godlike 续期
on:
  schedule:
    - cron: '0 */3 * * *'   
    - cron: '30 1-23/3 * * *' 
  workflow_dispatch:        

jobs:
  add_time_job:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout private scripts repository
        uses: actions/checkout@v4
        with:
          repository: akina005/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: private-scripts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright and dependencies
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run Time Adder Script
        env:
          godlike_PTERODACTYL_COOKIE: ${{ secrets.godlike_PTERODACTYL_COOKIE }}
          godlike_PTERODACTYL: ${{ secrets.godlike_PTERODACTYL }}
        working-directory: private-scripts/scripts/godlike
        run: python -u main.py

      - name: Upload error artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: private-scripts/scripts/godlike/*.png

      - name: Commit time.txt to private scripts repo
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        working-directory: private-scripts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f scripts/godlike/time.txt ]; then
            echo "首次生成时间：$(date +'%Y-%m-%d %H:%M:%S')" > scripts/godlike/time.txt
          else
            echo "$(date +'%Y-%m-%d %H:%M:%S')" > scripts/godlike/time.txt
          fi

          git add scripts/godlike/time.txt

          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "Update godlike time file: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi
