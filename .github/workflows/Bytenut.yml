name: Bytenut Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

# ⚠️ 必须添加权限配置，允许 Action 修改仓库文件
permissions:
  contents: write
  actions: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check next run time
      id: schedule_check
      env:
        REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "[INFO] 手动运行，跳过下次运行时间检查"
          exit 0
        fi

        NEXT=$(curl -fsSL \
          -H "Authorization: Bearer ${REPO_TOKEN}" \
          -H "Accept: application/vnd.github.raw" \
          "https://api.github.com/repos/akina005/scripts/contents/scripts/bytenut/next_run_epoch.txt?ref=main" \
          | tr -d '[:space:]' || true)

        if [ -z "$NEXT" ]; then
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "[INFO] 未从私库读取到下次运行时间，允许执行"
          exit 0
        fi

        NOW=$(date -u +%s)
        if ! echo "$NEXT" | grep -Eq '^[0-9]+$'; then
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "[WARN] 下次运行时间格式无效，允许执行"
          exit 0
        fi

        if [ "$NOW" -lt "$NEXT" ]; then
          NEXT_UTC=$(date -u -d "@$NEXT" +"%Y-%m-%d %H:%M UTC")
          NEXT_BJ=$(TZ=Asia/Shanghai date -d "@$NEXT" +"%Y-%m-%d %H:%M GMT+8")
          echo "should_run=false" >> "$GITHUB_OUTPUT"
          echo "[INFO] 未到运行时间，跳过。本次目标: $NEXT_UTC / $NEXT_BJ"
          exit 0
        fi

        echo "should_run=true" >> "$GITHUB_OUTPUT"
        echo "[INFO] 已到运行时间，开始执行"

    - name: Set up Python
      if: steps.schedule_check.outputs.should_run == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      if: steps.schedule_check.outputs.should_run == 'true'
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests

    - name: Install Xray
      if: steps.schedule_check.outputs.should_run == 'true'
      run: |
        wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
        mkdir -p xray-bin
        unzip -oq Xray-linux-64.zip -d xray-bin
        chmod +x xray-bin/xray
        sudo mv xray-bin/xray /usr/local/bin/xray

    - name: Setup Chrome
      if: steps.schedule_check.outputs.should_run == 'true'
      run: |
        seleniumbase install chromedriver

    - name: Fetch private bytenut script
      if: steps.schedule_check.outputs.should_run == 'true'
      env:
        REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
      run: |
        curl -sL \
          -H "Authorization: Bearer ${REPO_TOKEN}" \
          -H "Accept: application/vnd.github.raw" \
          -o bytenut.py \
          "https://api.github.com/repos/akina005/scripts/contents/scripts/bytenut/bytenut.py?ref=main"

    - name: Build Xray config
      if: steps.schedule_check.outputs.should_run == 'true'
      id: build_xray
      env:
        PROXY_URL: ${{ secrets.bytenut_PROXY_NODE }}
      run: |
        if [ -z "${PROXY_URL}" ]; then
          echo "use_proxy=false" >> "$GITHUB_OUTPUT"
          echo "[INFO] 未配置 bytenut_PROXY_NODE，使用直连"
          exit 0
        fi

        if python - <<'PY'
        import base64
        import json
        import os
        from urllib.parse import parse_qs, unquote, urlparse

        proxy_url = os.environ["PROXY_URL"]
        parsed = urlparse(proxy_url)
        scheme = parsed.scheme

        if scheme not in {"vless", "vmess"}:
            raise SystemExit(f"Unsupported proxy scheme: {scheme}")

        def build_stream_settings(query, host):
            transport_type = query.get("type", "tcp")
            if transport_type == "h2":
                transport_type = "http"

            stream_settings = {
                "network": transport_type,
                "security": query.get("security", "none"),
            }

            if stream_settings["security"] == "reality":
                reality = {
                    "serverName": query.get("sni", host),
                    "fingerprint": query.get("fp", "chrome"),
                    "publicKey": query.get("pbk", ""),
                }
                if query.get("sid"):
                    reality["shortId"] = query["sid"]
                if query.get("spx"):
                    reality["spiderX"] = query["spx"]
                stream_settings["realitySettings"] = reality
            elif stream_settings["security"] == "tls":
                stream_settings["tlsSettings"] = {
                    "serverName": query.get("sni", host),
                    "fingerprint": query.get("fp", "chrome"),
                }

            if transport_type == "tcp":
                header_type = query.get("headerType", "none")
                stream_settings["tcpSettings"] = {
                    "header": {"type": header_type}
                }
            elif transport_type == "ws":
                headers = {}
                if query.get("host"):
                    headers["Host"] = query["host"]
                stream_settings["wsSettings"] = {
                    "path": query.get("path", "/"),
                    "headers": headers,
                }
            elif transport_type == "http":
                host_list = [h for h in query.get("host", "").split(",") if h]
                stream_settings["httpSettings"] = {
                    "host": host_list,
                    "path": query.get("path", "/"),
                }
            elif transport_type == "grpc":
                stream_settings["grpcSettings"] = {
                    "serviceName": query.get("serviceName", ""),
                    "authority": query.get("authority", ""),
                }

            return stream_settings

        if scheme == "vless":
            qs = {k: v[-1] for k, v in parse_qs(parsed.query).items()}
            host = parsed.hostname
            port = parsed.port
            user_id = unquote(parsed.username or "")

            if not host or not port or not user_id:
                raise SystemExit("Invalid VLESS URL: missing host, port, or uuid")

            outbound = {
                "protocol": "vless",
                "settings": {
                    "vnext": [{
                        "address": host,
                        "port": port,
                        "users": [{
                            "id": user_id,
                            "encryption": qs.get("encryption", "none"),
                            "flow": qs.get("flow", ""),
                        }],
                    }]
                },
                "streamSettings": build_stream_settings(qs, host),
            }
        else:
            payload = parsed.netloc + parsed.path
            padded = payload + "=" * (-len(payload) % 4)
            vmess = json.loads(base64.urlsafe_b64decode(padded).decode("utf-8"))
            host = vmess.get("add")
            port = int(vmess.get("port", 0))
            user_id = vmess.get("id", "")
            if not host or not port or not user_id:
                raise SystemExit("Invalid VMess URL: missing host, port, or uuid")

            query = {
                "type": vmess.get("net", "tcp"),
                "security": vmess.get("tls", "none"),
                "path": vmess.get("path", "/") or "/",
                "host": vmess.get("host", ""),
                "sni": vmess.get("sni", "") or host,
                "fp": vmess.get("fp", "chrome"),
                "serviceName": vmess.get("path", ""),
                "authority": vmess.get("host", ""),
                "headerType": vmess.get("type", "none") or "none",
            }

            outbound = {
                "protocol": "vmess",
                "settings": {
                    "vnext": [{
                        "address": host,
                        "port": port,
                        "users": [{
                            "id": user_id,
                            "alterId": int(vmess.get("aid", 0) or 0),
                            "security": vmess.get("scy", "auto"),
                        }],
                    }]
                },
                "streamSettings": build_stream_settings(query, host),
            }

        config = {
            "log": {"loglevel": "warning"},
            "inbounds": [{
                "listen": "127.0.0.1",
                "port": 8080,
                "protocol": "http",
            }],
            "outbounds": [outbound],
        }

        with open("xray-config.json", "w", encoding="ascii") as f:
            json.dump(config, f, indent=2)
        PY
        then
          echo "use_proxy=true" >> "$GITHUB_OUTPUT"
          echo "[INFO] 代理节点解析成功"
        else
          echo "use_proxy=false" >> "$GITHUB_OUTPUT"
          echo "[WARN] 代理节点解析失败，自动回退直连"
        fi

    - name: Start Xray proxy
      id: start_xray
      if: steps.schedule_check.outputs.should_run == 'true' && steps.build_xray.outputs.use_proxy == 'true'
      continue-on-error: true
      run: |
        nohup xray run -c xray-config.json > xray.log 2>&1 &
        sleep 3
        if curl -s --max-time 15 --proxy http://127.0.0.1:8080 https://api.ipify.org; then
          echo
          echo "use_proxy=true" >> "$GITHUB_OUTPUT"
          echo "[INFO] Xray 代理可用"
        else
          echo "use_proxy=false" >> "$GITHUB_OUTPUT"
          echo "[WARN] Xray 代理不可用，自动回退直连"
        fi

    - name: Run Script
      if: steps.schedule_check.outputs.should_run == 'true'
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        bytenut_ACCOUNTS: ${{ secrets.bytenut_ACCOUNTS }}
        BYTENUT_NETWORK_MODE: ${{ steps.start_xray.outputs.use_proxy == 'true' && '代理' || '直连' }}
        USE_PROXY: ${{ steps.start_xray.outputs.use_proxy || 'false' }}
      run: |
        python - <<'PY'
        import os
        import re
        import subprocess
        import sys

        env = os.environ.copy()
        if os.environ.get("USE_PROXY") == "true":
            env["PROXY"] = "http://127.0.0.1:8080"
            print("[INFO] 当前使用代理模式", flush=True)
        else:
            env.pop("PROXY", None)
            print("[INFO] 当前使用直连模式", flush=True)

        proc = subprocess.Popen(
            ["xvfb-run", "-a", "python", "bytenut.py"],
            stdout=subprocess.PIPE,
            stderr=subprocess.STDOUT,
            text=True,
            encoding="utf-8",
            errors="replace",
            env=env,
        )

        patterns = [
            (re.compile(r"([A-Za-z0-9._%+-]{1,2})[A-Za-z0-9._%+-]*(@[A-Za-z0-9.-]+)"), r"\1***\2"),
            (re.compile(r"(?i)(password\s*[:=]\s*)(\S+)"), r"\1***"),
            (re.compile(r"([A-Za-z0-9._%+-]{2})[A-Za-z0-9._%+-]{3,}"), r"\1***"),
        ]

        with open("renew.log", "w", encoding="utf-8") as log_file:
            for raw_line in proc.stdout:
                line = raw_line.rstrip("\n")
                for pattern, repl in patterns:
                    line = pattern.sub(repl, line)
                print(line, flush=True)
                log_file.write(line + "\n")
                log_file.flush()

        raise SystemExit(proc.wait())
        PY

    - name: 提取冷却时间
      id: extract_cooldown
      if: success() && steps.schedule_check.outputs.should_run == 'true'
      run: |
        COOLDOWN_MINUTES=$(python - <<'PY'
        import re

        latest = ""
        with open("renew.log", "r", encoding="utf-8") as f:
            for line in f:
                match = re.search(r"冷却剩余=(\d+)分钟", line)
                if match:
                    latest = match.group(1)

        print(latest)
        PY
        )

        if [ -z "$COOLDOWN_MINUTES" ]; then
          echo "skip_update=true" >> "$GITHUB_OUTPUT"
          echo "::warning::未从日志中提取到冷却分钟数，跳过 Cron 更新"
          exit 0
        fi

        echo "cooldown_minutes=$COOLDOWN_MINUTES" >> "$GITHUB_OUTPUT"
        echo "skip_update=false" >> "$GITHUB_OUTPUT"
        echo "::notice::⏳ 冷却剩余: $COOLDOWN_MINUTES 分钟"

    - name: 更新下次运行时间
      if: success() && steps.extract_cooldown.outputs.skip_update != 'true'
      env:
        GH_TOKEN: ${{ secrets.REPO_TOKEN }}
      run: |
        set -e

        COOLDOWN_MINUTES=${{ steps.extract_cooldown.outputs.cooldown_minutes }}
        if [ "$COOLDOWN_MINUTES" -le 0 ]; then
          echo "::warning::冷却时间无效，跳过 Cron 更新"
          exit 0
        fi

        NEXT_DATE=$(date -u -d "+${COOLDOWN_MINUTES} minutes" +"%Y-%m-%d %H:%M")
        NEXT_EPOCH=$(date -u -d "+${COOLDOWN_MINUTES} minutes" +%s)
        NEXT_BJ=$(TZ=Asia/Shanghai date -d "@$NEXT_EPOCH" +"%Y-%m-%d %H:%M GMT+8")

        echo "::notice::⏰ 下次运行: $NEXT_DATE UTC"
        echo "::notice::⏰ 下次运行(北京时间): $NEXT_BJ"

        git clone "https://x-access-token:${GH_TOKEN}@github.com/akina005/scripts.git" workflow_repo
        cd workflow_repo

        mkdir -p scripts/bytenut
        printf "%s\n" "$NEXT_EPOCH" > scripts/bytenut/next_run_epoch.txt
        printf "%s / %s\n" "$NEXT_DATE UTC" "$NEXT_BJ" > scripts/bytenut/next_run_time.txt

        if git diff --quiet scripts/bytenut/next_run_epoch.txt scripts/bytenut/next_run_time.txt; then
          echo "::notice::没有变化需要提交"
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add scripts/bytenut/next_run_epoch.txt scripts/bytenut/next_run_time.txt
        git commit -m "chore: update Bytenut next run time" \
                   -m "Next run: $NEXT_DATE UTC" \
                   -m "Next run BJ: $NEXT_BJ" \
                   -m "Cooldown: $COOLDOWN_MINUTES minutes"
        git push

        echo "::notice::✅ 下次运行时间更新成功"

    - name: 清理旧的工作流运行记录
      if: always() && steps.schedule_check.outputs.should_run == 'true'
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        delete_workflow_pattern: ${{ github.workflow }}
        retain_days: 0
        keep_minimum_runs: 4
